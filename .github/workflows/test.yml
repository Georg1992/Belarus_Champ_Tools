name: Tests

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # Guard against accidentally pruning exported methods on the runner types
  # (Runner, KeyChainRunner, TimerKeyRunner, ViiperSession) that still have
  # external callers. The runner package imports runner/platform/windows, so
  # this must run on Windows.
  dead-methods:
    name: Dead methods guard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
      - name: Run dead-methods guard
        working-directory: app
        run: |
          go vet ./...
          go test ./runner/ -run TestNoDeadMethods -v
